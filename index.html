<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Java Compiler - Programiz</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --pg-blue: #0056d2;
            --border: #e1e4e8;
            --sidebar: #f8f9fa;
            --toolbar-bg: #ffffff;
            --output-bg: #ffffff;
        }
        body {
            font-family: "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: white;
            color: #24292e;
        }
        /* HEADER */
        header {
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 50px;
            flex-shrink: 0;
            background: white;
        }
        .logo-area { display: flex; align-items: center; gap: 10px; }
        .logo-main { font-weight: 800; font-size: 20px; color: #25265e; }
        .logo-sub { font-size: 11px; color: #888; border-left: 1px solid #ccc; padding-left: 10px; margin-left: 2px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .header-btn {
            background: none; border: 1px solid var(--border); padding: 5px 14px;
            border-radius: 4px; font-size: 13px; cursor: pointer; color: #444;
        }
        .header-btn.primary { background: var(--pg-blue); color: white; border-color: var(--pg-blue); }

        /* BODY */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* SIDEBAR */
        .sidebar {
            width: 48px;
            background: #f8f9fa;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 10px;
            gap: 12px;
            flex-shrink: 0;
        }
        .icon-circle {
            width: 30px; height: 30px; border-radius: 50%;
            background: #ddd; display: flex; align-items: center;
            justify-content: center; font-size: 11px; color: #666; font-weight: bold;
            cursor: pointer;
        }
        .icon-java { background: var(--pg-blue); color: white; font-size: 14px; }
        .icon-sidebar { background: #e0e0e0; color: #555; font-size: 12px; }

        /* WORKSPACE */
        .workspace { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

        /* TOOLBAR */
        .toolbar {
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 42px;
            background: white;
            flex-shrink: 0;
        }
        .tabs { display: flex; height: 100%; }
        .tab {
            border-right: 1px solid var(--border);
            border-top: 3px solid var(--pg-blue);
            padding: 0 22px;
            height: 100%;
            display: flex;
            align-items: center;
            font-size: 13px;
            font-weight: 600;
            color: #333;
            background: #f9f9f9;
            gap: 8px;
        }
        .tab .close-icon { font-size: 11px; color: #999; cursor: pointer; }
        .toolbar-actions { display: flex; align-items: center; gap: 10px; margin-right: 16px; }
        .run-btn {
            background: var(--pg-blue); color: white; border: none;
            padding: 6px 28px; border-radius: 4px; font-weight: 700;
            cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 6px;
        }
        .run-btn:hover { background: #0047b3; }
        .run-btn .play-icon { font-size: 10px; }
        .input-hint {
            font-size: 12px; color: #888;
            border: 1px solid var(--border); border-radius: 4px;
            padding: 4px 10px;
        }

        /* PANES */
        .panes { display: flex; flex: 1; overflow: hidden; }

        /* EDITOR */
        .editor-pane {
            flex: 1;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            background: #fff;
        }
        .editor-wrap {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        .line-numbers {
            background: #f9f9f9;
            border-right: 1px solid #eee;
            padding: 15px 10px 15px 8px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            color: #aaa;
            text-align: right;
            user-select: none;
            min-width: 40px;
            overflow: hidden;
        }
        #code-input {
            flex: 1;
            border: none;
            padding: 15px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
            outline: none;
            resize: none;
            color: #24292e;
            background: white;
            tab-size: 4;
        }
        #code-input::placeholder { color: #aaa; }

        /* INPUT BOX */
        .input-section {
            border-top: 1px solid var(--border);
            background: #f9f9f9;
            flex-shrink: 0;
        }
        .input-label {
            padding: 6px 14px;
            font-size: 12px;
            font-weight: 600;
            color: #888;
            border-bottom: 1px solid #eee;
        }
        #prog-input {
            width: 100%;
            border: none;
            padding: 8px 14px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            background: #f9f9f9;
            outline: none;
            color: #333;
        }
        #prog-input::placeholder { color: #bbb; }

        /* OUTPUT */
        .output-pane {
            flex: 1;
            background: white;
            display: flex;
            flex-direction: column;
            min-width: 280px;
        }
        .output-header {
            padding: 10px 18px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            color: #666;
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .output-header span { color: #aaa; font-size: 11px; font-weight: normal; }
        .clear-btn {
            background: none; border: none; font-size: 12px;
            color: #aaa; cursor: pointer; padding: 2px 6px;
            border-radius: 3px;
        }
        .clear-btn:hover { background: #f0f0f0; color: #666; }
        #console {
            flex: 1;
            padding: 18px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 14px;
            color: #24292e;
            white-space: pre-wrap;
            overflow-y: auto;
            line-height: 1.6;
        }
        #console .error { color: #d73a49; }
        #console .success { color: #22863a; }
        #console .info { color: #0056d2; }

        /* STATUS BAR */
        .status-bar {
            border-top: 1px solid var(--border);
            background: #f8f9fa;
            padding: 3px 14px;
            font-size: 11px;
            color: #888;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        /* TOOLTIP */
        .tooltip {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: #25265e;
            color: white;
            padding: 6px 14px;
            border-radius: 5px;
            font-size: 12px;
            z-index: 100;
            display: none;
            white-space: nowrap;
        }
        .tooltip.visible { display: block; }
    </style>
</head>
<body>

<!-- HEADER -->
<header>
    <div class="logo-area">
        <span class="logo-main">Programiz</span>
        <span class="logo-sub">Online Java Compiler</span>
    </div>
    <div class="header-right">
        <button class="header-btn">Java ▾</button>
        <button class="header-btn primary">PRO</button>
    </div>
</header>

<div class="app-body">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="icon-circle icon-java">☕</div>
        <div class="icon-circle icon-sidebar">📁</div>
        <div class="icon-circle icon-sidebar">⚙</div>
    </div>

    <!-- WORKSPACE -->
    <div class="workspace">
        <!-- TOOLBAR -->
        <div class="toolbar">
            <div class="tabs">
                <div class="tab">
                    ☕ Main.java <span class="close-icon">✕</span>
                </div>
            </div>
            <div class="toolbar-actions">
                <span class="input-hint">Enter 1–19 in Input, press Run</span>
                <button class="run-btn" onclick="runProgram()">
                    <span class="play-icon">▶</span> Run
                </button>
            </div>
        </div>

        <!-- PANES -->
        <div class="panes">
            <!-- EDITOR -->
            <div class="editor-pane">
                <div class="tooltip" id="tooltip">Program loaded! Press Run again to execute.</div>
                <div class="editor-wrap">
                    <div class="line-numbers" id="line-numbers">1</div>
                    <textarea id="code-input" spellcheck="false"
                        placeholder="Type a program number (1–19) in the Input box below and click Run..."></textarea>
                </div>
                <div class="input-section">
                    <div class="input-label">Input (stdin)</div>
                    <input type="text" id="prog-input" placeholder="Enter program number (1 to 19) and press Run..." />
                </div>
            </div>

            <!-- OUTPUT -->
            <div class="output-pane">
                <div class="output-header">
                    Output
                    <span>
                        <button class="clear-btn" onclick="clearOutput()">Clear</button>
                    </span>
                </div>
                <div id="console">// Output will appear here after you click Run</div>
            </div>
        </div>

        <!-- STATUS BAR -->
        <div class="status-bar">
            <span id="status-left">Ready</span>
            <span>Java 17 | UTF-8</span>
        </div>
    </div>
</div>

        System.out.print("Enter a number: ");
        int num = sc.nextInt();

public class MatrixTranspose {
    public static void main(String[] args) {
        Scanner sc = new Scanner(System.in);
        System.out.print("Enter number of rows: ");
        int rows = sc.nextInt();

        int[][] transpose = new int[cols][rows];

class BankAccount {
    private String depositorName;

let loaded = false;
let currentNum = null;

function updateLineNumbers() {
    const textarea = document.getElementById('code-input');
    const lineNums = document.getElementById('line-numbers');
    const lines = textarea.value.split('\n').length;
    let nums = '';
    for (let i = 1; i <= Math.max(lines, 1); i++) {
        nums += i + '\n';
    }
    lineNums.textContent = nums;
}

function syncScroll() {
    const textarea = document.getElementById('code-input');
    const lineNums = document.getElementById('line-numbers');
    lineNums.scrollTop = textarea.scrollTop;
}

document.getElementById('code-input').addEventListener('input', updateLineNumbers);
document.getElementById('code-input').addEventListener('scroll', syncScroll);
document.getElementById('prog-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') runProgram();
});

function showTooltip(msg) {
    const t = document.getElementById('tooltip');
    t.textContent = msg;
    t.classList.add('visible');
    setTimeout(() => t.classList.remove('visible'), 2500);
}

function runProgram() {
    const key = document.getElementById('prog-input').value.trim();
    const consoleOut = document.getElementById('console');
    const statusLeft = document.getElementById('status-left');

    if (!key) {
        consoleOut.innerHTML = '<span class="error">Error: Please enter a program number (1–19) in the Input box below.</span>';
        return;
    }

    if (!programs[key]) {
        consoleOut.innerHTML = `<span class="error">Error: Program "${key}" not found. Please enter a number between 1 and 19.</span>`;
        statusLeft.textContent = 'Error';
        return;
    }

    const prog = programs[key];

    // First run: load code into editor
    if (!loaded || currentNum !== key) {
        document.getElementById('code-input').value = prog.code;
        updateLineNumbers();
        loaded = true;
        currentNum = key;
        consoleOut.innerHTML = `<span class="info">// Program ${key}: ${prog.title} loaded into editor.\n// Press Run again to see the output.</span>`;
        statusLeft.textContent = `Loaded: Program ${key} — ${prog.title}`;
        showTooltip(`Program ${key} loaded! Press Run again to execute.`);
        return;
    }

    // Second run: show output
    consoleOut.textContent = prog.output;
    statusLeft.textContent = `Executed: Program ${key} — ${prog.title}`;
    loaded = false; // reset so next entry of same number reloads
}

function clearOutput() {
    document.getElementById('console').textContent = '// Output will appear here after you click Run';
    document.getElementById('status-left').textContent = 'Ready';
    loaded = false;
    currentNum = null;
}

// Init line numbers
updateLineNumbers();

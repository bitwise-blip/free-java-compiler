<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Java Compiler - Programiz Style</title>
    <style>
        :root { --nav-bg: #24292e; --editor-bg: #ffffff; --console-bg: #f8f9fa; --accent: #448aff; --text-dark: #333; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; background: #eef1f5; }
        
        /* Programiz-style Header */
        nav { background: var(--nav-bg); padding: 12px 24px; display: flex; align-items: center; justify-content: space-between; color: white; }
        .logo { font-weight: bold; font-size: 18px; letter-spacing: 0.5px; }
        .run-btn { background: var(--accent); color: white; border: none; padding: 8px 30px; border-radius: 4px; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .run-btn:hover { background: #2979ff; box-shadow: 0 2px 8px rgba(68,138,255,0.4); }

        /* Split-Pane Layout */
        .main-container { display: flex; flex: 1; overflow: hidden; gap: 2px; background: #ddd; }
        .pane { flex: 1; display: flex; flex-direction: column; background: white; }
        .tab-bar { background: #f1f3f4; padding: 8px 16px; font-size: 13px; color: #5f6368; border-bottom: 1px solid #ddd; font-weight: 500; }
        
        /* Code Editor Area */
        textarea { flex: 1; border: none; padding: 20px; font-family: "Fira Code", "Courier New", monospace; font-size: 15px; line-height: 1.6; outline: none; resize: none; color: #24292e; }
        
        /* Console Output Area */
        #console { flex: 1; background: var(--console-bg); color: #24292e; padding: 20px; font-family: monospace; font-size: 14px; overflow-y: auto; white-space: pre-wrap; border-left: 1px solid #ddd; }
        .output-label { color: #888; font-weight: bold; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<nav>
    <div class="logo">Online Java Compiler</div>
    <button class="run-btn" onclick="runCompiler()">Run</button>
</nav>

<div class="main-container">
    <div class="pane">
        <div class="tab-bar">main.java</div>
        <textarea id="editor" spellcheck="false" placeholder=""></textarea>
    </div>
    
    <div class="pane">
        <div class="tab-bar">Output</div>
        <div id="console"><span class="output-label"></span></div>
    </div>
</div>

<script>
    // Logic Library from jaava.pdf [cite: 1-511]
    const snippets = {
        "1": { code: "public class HelloWorld {\n    public static void main(String[] args) {\n        System.out.println(\"Hello, World!\");\n    }\n}", out: "Hello, World!" },
        "2": { code: "public class AddTwoNumbers {\n    public static void main(String[] args) {\n        int number1 = 5, number2 = 10;\n        int sum = number1 + number2;\n        System.out.println(\"Sum: \" + sum);\n    }\n}", out: "Sum: 15" },
        "7": { 
            code: "import java.util.Scanner;\n\npublic class PrimeCheck {\n    public static void main(String[] args) {\n        int num = 29;\n        boolean isPrime = true;\n        if (num <= 1) isPrime = false;\n        else {\n            for (int i = 2; i <= num / 2; i++) {\n                if (num % i == 0) { isPrime = false; break; }\n            }\n        }\n        if (isPrime) System.out.println(num + \" is a Prime number.\");\n        else System.out.println(num + \" is NOT a Prime number.\");\n    }\n}", 
            out: "29 is a Prime number." 
        },
        "8": { code: "public class PalindromeNumber {\n    public static void main(String[] args) {\n        int num = 121, original = num, reverse = 0;\n        while (num > 0) {\n            int digit = num % 10;\n            reverse = reverse * 10 + digit;\n            num = num / 10;\n        }\n        if (original == reverse) System.out.println(original + \" is a Palindrome.\");\n    }\n}", out: "121 is a Palindrome." }
    };

    function runCompiler() {
        const editor = document.getElementById('editor');
        const consoleOut = document.getElementById('console');
        const val = editor.value.trim();

        if (snippets[val]) {
            const selected = snippets[val];
            editor.value = selected.code; // Swap input for full code 
            consoleOut.innerHTML = "<span style='color: #444;'>$ java main.java</span>\n" + selected.out; // 
        } else if (val === "") {
            consoleOut.innerHTML = "<span style='color: #d32f2f;'>Error: Please enter a program ID to compile.</span>";
        } else {
            consoleOut.innerHTML = "<span style='color: #444;'>$ java main.java</span>\n" + val + " (Program executed, but no output mapped.)";
        }
    }
</script>

</body>
</html>

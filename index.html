<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Online Java Compiler - Programiz</title>
    <style>
        :root { --pg-blue: #0056d2; --bg-main: #f0f2f5; --border: #e1e4e8; --sidebar: #f8f9fa; }
        body { margin: 0; font-family: "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background: white; }

        /* Top Header */
        header { border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo-area { display: flex; flex-direction: column; }
        .logo-main { font-weight: 800; font-size: 20px; color: #25265e; line-height: 1; }
        .logo-sub { font-size: 12px; color: #666; margin-top: 4px; }
        .pro-btn { border: 1px solid var(--pg-blue); color: var(--pg-blue); background: white; padding: 6px 15px; border-radius: 4px; font-weight: 600; font-size: 13px; }

        /* Main App Container */
        .app-body { display: flex; flex: 1; overflow: hidden; }

        /* Left Sidebar Icons */
        .sidebar { width: 45px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; align-items: center; padding-top: 10px; gap: 15px; }
        .icon-circle { width: 28px; height: 28px; border-radius: 50%; background: #ddd; display: flex; align-items: center; justify-content: center; font-size: 10px; color: #666; font-weight: bold; }
        .icon-java { background: var(--pg-blue); color: white; }

        /* Workspace with Editor and Console */
        .workspace { flex: 1; display: flex; flex-direction: column; }
        .toolbar { border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; height: 45px; background: white; }
        .tab { border-right: 1px solid var(--border); border-top: 3px solid var(--pg-blue); padding: 0 25px; height: 100%; display: flex; align-items: center; font-size: 13px; font-weight: 600; color: #333; background: #f9f9f9; }
        .controls { display: flex; align-items: center; gap: 15px; padding-right: 20px; }
        .ctrl-icon { color: #888; font-size: 16px; cursor: pointer; }
        .run-btn { background: var(--pg-blue); color: white; border: none; padding: 6px 30px; border-radius: 4px; font-weight: bold; cursor: pointer; }

        /* Pane Layout */
        .panes { display: flex; flex: 1; overflow: hidden; }
        .editor-pane { flex: 1; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
        .output-pane { flex: 1; background: white; display: flex; flex-direction: column; }
        .output-header { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-size: 14px; color: #666; font-weight: 600; }
        .clear-btn { border: 1px solid var(--border); background: white; color: #888; padding: 2px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        /* Text Areas */
        textarea { flex: 1; border: none; padding: 15px; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; line-height: 1.5; outline: none; resize: none; color: #24292e; }
        #console { flex: 1; padding: 20px; font-family: monospace; font-size: 14px; color: #333; white-space: pre-wrap; overflow-y: auto; }
    </style>
</head>
<body>

<header>
    <div class="logo-area">
        <span class="logo-main">Programiz</span>
        <span class="logo-sub">Online Java Compiler</span>
    </div>
    <button class="pro-btn">Programiz PRO ></button>
</header>

<div class="app-body">
    <div class="sidebar">
        <div class="icon-circle">Py</div>
        <div class="icon-circle">R</div>
        <div class="icon-circle">C</div>
        <div class="icon-circle icon-java">☕</div>
        <div class="icon-circle">K</div>
        <div class="icon-circle">JS</div>
    </div>

    <div class="workspace">
        <div class="toolbar">
            <div class="tab">Main.java</div>
            <div class="controls">
                <span class="ctrl-icon">⛶</span>
                <span class="ctrl-icon">☾</span>
                <span class="ctrl-icon">🔗</span>
                <button class="run-btn" onclick="processJava()">Run</button>
            </div>
        </div>

        <div class="panes">
            <div class="editor-pane">
                <textarea id="code-input" spellcheck="false"></textarea>
            </div>
            <div class="output-pane">
                <div class="output-header">
                    <span>Output</span>
                    <button class="clear-btn" onclick="document.getElementById('console').innerHTML = ''">Clear</button>
                </div>
                <div id="console"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const db = {
        "7": {
            code: "import java.util.Scanner;\n\nclass Main {\n    public static void main(String[] args) {\n        int num = 29;\n        boolean isPrime = true;\n        if (num <= 1) isPrime = false;\n        else {\n            for (int i = 2; i <= num / 2; i++) {\n                if (num % i == 0) { isPrime = false; break; }\n            }\n        }\n        if (isPrime) System.out.println(num + \" is a Prime number.\");\n        else System.out.println(num + \" is NOT a Prime number.\");\n    }\n}",
            out: "29 is a Prime number."
        },
        "8": {
            code: "class Main {\n    public static void main(String[] args) {\n        int num = 121, rev = 0, rem, temp = num;\n        while (temp != 0) {\n            rem = temp % 10;\n            rev = rev * 10 + rem;\n            temp /= 10;\n        }\n        if (num == rev) System.out.println(num + \" is a Palindrome.\");\n    }\n}"
        }
    };

    function processJava() {
        const editor = document.getElementById('code-input');
        const consoleOut = document.getElementById('console');
        const key = editor.value.trim();

        if (db[key]) {
            const data = db[key];
            editor.value = data.code; // Swap ID for source code 
            consoleOut.innerHTML = data.out || "Execution finished."; // 
        } else if (key === "") {
            consoleOut.innerHTML = "No input detected.";
        } else {
            consoleOut.innerHTML = "Result: " + key;
        }
    }
</script>

</body>
</html>
